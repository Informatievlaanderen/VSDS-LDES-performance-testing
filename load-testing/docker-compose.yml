  ldes-server:
    # image: ghcr.io/informatievlaanderen/ldes-server:latest
    # image: ldes/ldes-server:${LDES_SERVER_TAG:-2.3.0-SNAPSHOT} # CrowdScan
    # image: ldes/ldes-server:${LDES_SERVER_TAG:-2.4.1-SNAPSHOT} # Geomobility
    # image: ldes/ldes-server:${LDES_SERVER_TAG:-2.10.0-SNAPSHOT} # Telraam
    # image: ldes/ldes-server:${LDES_SERVER_TAG:-2.14.0-SNAPSHOT}
    # image: ldes/ldes-server:${LDES_SERVER_TAG:-postgres-exp-1}
    image: docker.io/vsds/ldes-server:equivalent
    container_name: performance-testing_ldes-server
    networks:
      - performance-testing
    ports:
      - 8080:8080
    volumes:
      - ./server/tmp/epsg:/tmp/Databases:rw
      - ./server/config.yml:/application.yml:ro
    depends_on:
      # - ldes-mongodb
      - ldes-postgresdb
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://ldes-server:8080/actuator/health"]
    environment:
      - SIS_DATA=/tmp
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=90 -XX:MinRAMPercentage=50
      # - SPRING_DATA_MONGODB_URI=mongodb://ldes-mongodb:27017/performance-testing
      - LDESSERVER_HOSTNAME=http://ldes-server:${LDES_SERVER_PORT:-8080}
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ldes-postgresdb:5432/performance-testing
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDLAUTO=update
      - SPRING_BATCH_JDBC_INITIALIZESCHEMA=always
      - LDESSERVER_MIGRATEMONGO=false
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: '2.0GB'
        reservations:
          cpus: '0.50'
          memory: '0.5GB'


  ldes-postgresdb:
    image: postgres:${POSTGRES_TAG:-latest}
    container_name: performance-testing_ldes-postgresdb
    shm_size: 128mb
    networks:
      - performance-testing
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=admin
      - POSTGRES_USER=admin
      - POSTGRES_DB=performance-testing


  adminer:
    image: adminer:${POSTGRES_TAG:-latest}
    container_name: performance-testing_adminer
    networks:
      - performance-testing
    ports:
      - 8088:8080
    depends_on:
      - ldes-postgresdb
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://adminer:8080/"]


